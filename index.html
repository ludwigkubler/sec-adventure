<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quell'isola — The Castaway's Isle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=2.0.2">
</head>
<body>
<div id="game">
  <div id="scene" role="application" aria-label="Adventure scene">
    <div id="bg" aria-hidden="true"></div>
    <div id="bg-near" aria-hidden="true"></div>
    <div id="ambient-fx" aria-hidden="true"></div>
    <div id="film-grain" aria-hidden="true"></div>
    <div id="vignette" aria-hidden="true"></div>
    <div id="iris-reveal" aria-hidden="true"></div>
    <div id="hotspots" role="group" aria-label="Interactive elements"></div>
    <div id="cursor-hint" aria-hidden="true"></div>
    <div id="scene-title" aria-live="polite"></div>
    <nav id="topbar" aria-label="Game controls">
      <button class="topbtn" id="btn-map" title="Map (T)" aria-label="Map"><span aria-hidden="true">🗺</span></button>
      <button class="topbtn" id="btn-codex" title="Codex (C)" aria-label="Codex"><span aria-hidden="true">📜</span></button>
      <button class="topbtn" id="btn-journal" title="Journal (J)" aria-label="Journal"><span aria-hidden="true">📖</span></button>
      <button class="topbtn" id="btn-hint" title="Hint (H)" aria-label="Contextual hint"><span aria-hidden="true">💡</span></button>
      <button class="topbtn" id="btn-mute" title="Audio (M)" aria-label="Toggle audio"><span aria-hidden="true">🔊</span></button>
      <button class="topbtn" id="btn-lang" title="Language (L)" aria-label="Toggle language"><span aria-hidden="true">🌐</span></button>
      <button class="topbtn" id="btn-fullscreen" title="Fullscreen (F)" aria-label="Fullscreen"><span aria-hidden="true">⛶</span></button>
      <button class="topbtn" id="btn-help" title="Help (?)" aria-label="Help">?</button>
      <button class="topbtn" id="btn-menu" title="Menu (ESC)" aria-label="Menu"><span aria-hidden="true">≡</span></button>
    </nav>
    <div id="hud-overlay" aria-label="Game status" role="status">
      <span id="hud-time" title="Tempo gioco" aria-label="Tempo gioco">⏱ 00:00</span>
      <span id="hud-rooms" title="Stanze visitate" aria-label="Stanze visitate">🏠 0/46</span>
      <span id="hud-pct" title="Completamento" aria-label="Completamento">✦ 0%</span>
    </div>
  </div>
  <!-- Inventario laterale a destra, collassabile (Zaino) -->
  <aside id="inv-side" class="collapsed" aria-label="Inventory">
    <button id="inv-toggle" aria-expanded="false" title="Toggle inventory (I)">
      <span class="inv-chev" aria-hidden="true">◀</span>
      <span class="inv-count">0</span>
    </button>
    <div id="inv-side-body" role="toolbar">
      <div class="inv-frame">
        <div class="inv-corner inv-corner-tl" aria-hidden="true"></div>
        <div class="inv-corner inv-corner-tr" aria-hidden="true"></div>
        <div class="inv-corner inv-corner-bl" aria-hidden="true"></div>
        <div class="inv-corner inv-corner-br" aria-hidden="true"></div>
        <h3 class="inv-title">
          <span class="inv-title-flourish" aria-hidden="true">❦</span>
          <span class="inv-title-text">ZAINO</span>
          <span class="inv-title-flourish" aria-hidden="true">❦</span>
        </h3>
        <div id="inventory-bar" role="toolbar" aria-label="Inventory slots"></div>
      </div>
    </div>
  </aside>
  <div id="hud-log" role="status" aria-live="polite" aria-atomic="false"></div>
  <div id="text-log" aria-hidden="true" style="display:none"></div>
  <div id="modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-content">
    <div id="modal-content" tabindex="-1"></div>
  </div>
  <div id="title-screen">
    <div class="title-bg"></div>
    <div class="title-inner">
      <h1>Quell'isola</h1>
      <p class="subtitle">~ The Castaway's Isle ~</p>
      <div class="title-buttons">
        <button id="btn-new">Nuova partita</button>
        <button id="btn-continue">Continua</button>
      </div>
      <p class="credits">avventura punta-e-clicca · mondo vivo · tecnologia open source · v2.0</p>
    </div>
  </div>
</div>
<script src="js/state-machine.js?v=2.0.2"></script>
<script src="js/i18n.js?v=2.0.2"></script>
<script src="js/engine.js?v=2.0.2"></script>
<script src="js/audio.js?v=2.0.2"></script>
<script src="js/fx.js?v=2.0.2"></script>
<script src="js/render.js?v=2.0.2"></script>
<script src="js/v2-systems.js?v=2.0.2"></script>
<script src="js/ui.js?v=2.0.2"></script>
<script src="js/input.js?v=2.0.2"></script>
<script src="js/main.js?v=2.0.2"></script>
</body>
</html>
