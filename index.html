<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>L'Isola del Naufragio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="game">
  <div id="scene" role="application" aria-label="Adventure scene">
    <div id="bg" aria-hidden="true"></div>
    <div id="bg-near" aria-hidden="true"></div>
    <div id="ambient-fx" aria-hidden="true"></div>
    <div id="film-grain" aria-hidden="true"></div>
    <div id="vignette" aria-hidden="true"></div>
    <div id="iris-reveal" aria-hidden="true"></div>
    <div id="hotspots" role="group" aria-label="Interactive elements"></div>
    <div id="cursor-hint" aria-hidden="true"></div>
    <div id="scene-title" aria-live="polite"></div>
    <nav id="topbar" aria-label="Game controls">
      <button class="topbtn" id="btn-map" title="Map (T)" aria-label="Map"><span aria-hidden="true">🗺</span></button>
      <button class="topbtn" id="btn-codex" title="Codex (C)" aria-label="Codex — lore collectibles"><span aria-hidden="true">📜</span></button>
      <button class="topbtn" id="btn-journal" title="Journal (J)" aria-label="Journal — active quests"><span aria-hidden="true">📖</span></button>
      <button class="topbtn" id="btn-hint" title="Hint (H)" aria-label="Contextual hint"><span aria-hidden="true">💡</span></button>
      <button class="topbtn" id="btn-mute" title="Audio (M)" aria-label="Toggle audio"><span aria-hidden="true">🔊</span></button>
      <button class="topbtn" id="btn-lang" title="Language (L)" aria-label="Toggle language Italian / English"><span aria-hidden="true">🌐</span></button>
      <button class="topbtn" id="btn-fullscreen" title="Fullscreen (F)" aria-label="Toggle fullscreen"><span aria-hidden="true">⛶</span></button>
      <button class="topbtn" id="btn-help" title="Help (?)" aria-label="Help">?</button>
      <button class="topbtn" id="btn-menu" title="Menu (ESC)" aria-label="Menu"><span aria-hidden="true">≡</span></button>
    </nav>
    <div id="hud-overlay" aria-label="Game status" role="status">
      <span id="hud-time" title="Time" aria-label="Elapsed time">⏱ 00:00</span>
      <span id="hud-rooms" title="Rooms visited" aria-label="Rooms visited">🏠 0/36</span>
      <span id="hud-pct" title="Completion" aria-label="Completion">✦ 0%</span>
    </div>
  </div>
  <!-- Inventario laterale a destra, collassabile -->
  <aside id="inv-side" class="collapsed" aria-label="Inventory">
    <button id="inv-toggle" aria-expanded="false" title="Toggle inventory (I)">
      <span class="inv-chev" aria-hidden="true">◀</span>
      <span class="inv-count">0</span>
    </button>
    <div id="inv-side-body" role="toolbar">
      <div id="inventory-bar" role="toolbar" aria-label="Inventory slots"></div>
    </div>
  </aside>
  <!-- Log di sistema minimalista, appare solo per messaggi system brevi -->
  <div id="hud-log" role="status" aria-live="polite" aria-atomic="false"></div>
  <!-- Mantieni text-log nascosto (usato come fallback da librerie) -->
  <div id="text-log" aria-hidden="true" style="display:none"></div>
  <div id="modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-content">
    <div id="modal-content" tabindex="-1"></div>
  </div>
  <div id="title-screen">
    <div class="title-bg"></div>
    <div class="title-inner">
      <h1>L'Isola del Naufragio</h1>
      <p class="subtitle">~ un'avventura grafica ~</p>
      <div class="title-buttons">
        <button id="btn-new">Nuova partita</button>
        <button id="btn-continue">Continua</button>
      </div>
      <p class="credits">avventura punta-e-clicca · audio procedurale · tecnologia open source</p>
    </div>
  </div>
</div>
<script src="js/i18n.js"></script>
<script src="js/engine.js"></script>
<script src="js/audio.js"></script>
<script src="js/fx.js"></script>
<script src="js/render.js"></script>
<script src="js/ui.js"></script>
<script src="js/input.js"></script>
<script src="js/main.js"></script>
</body>
</html>
